<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main id="playing-cards">

    
    <div class="card">
      <div class="card-inner">

        <div class="card-front">
          <div class="left red">A ♥</div>
          <div class="middle red">
            <div>♥</div>
          </div>
          <div class="right red">A ♥</div>
        </div>

        <div class="card-back">
          🂠
        </div>

      </div>
    </div>

    
    <div class="card">
      <div class="card-inner">

        <div class="card-front">
          <div class="left">K ♠</div>
          <div class="middle">
            <div>♠</div>
          </div>
          <div class="right">K ♠</div>
        </div>

        <div class="card-back">
          🂠
        </div>

      </div>
    </div>

  
    <div class="card">
      <div class="card-inner">

        <div class="card-front">
          <div class="left red">Q ♦</div>
          <div class="middle red">
            <div>♦</div>
          </div>
          <div class="right red">Q ♦</div>
        </div>

        <div class="card-back">
          🂠
        </div>

      </div>
    </div>

  </main>

</body>
</html>
